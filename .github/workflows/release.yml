name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Resolve release version
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid VERSION value: ${version}" >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_name }}" != "${tag}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${version}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build / ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            asset_suffix: linux
            executable_name: Open3SDCMCLI
            artifact_name: release-linux
            archive_extension: tar.gz
            archive_format: gnutar
            vcpkg_force_system_binaries: '1'
            vcpkg_default_triplet: ''
          - name: macOS
            os: macos-latest
            asset_suffix: macos
            executable_name: Open3SDCMCLI
            artifact_name: release-macos
            archive_extension: tar.gz
            archive_format: gnutar
            vcpkg_force_system_binaries: ''
            vcpkg_default_triplet: ''
          - name: Windows
            os: windows-latest
            asset_suffix: windows
            executable_name: Open3SDCMCLI.exe
            artifact_name: release-windows
            archive_extension: zip
            archive_format: zip
            vcpkg_force_system_binaries: ''
            vcpkg_default_triplet: 'x64-windows'

    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Install Ninja
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y ninja-build
          elif [ "${{ runner.os }}" = "macOS" ]; then
            brew install ninja
          fi

      - name: Install Ninja on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ninja --yes

      - name: Show tool versions
        shell: bash
        run: |
          set -euo pipefail
          cmake --version
          ninja --version

      - name: Configure release build
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: ${{ matrix.vcpkg_force_system_binaries }}
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_default_triplet }}
        run: cmake --preset ninja-release-vcpkg

      - name: Build release binaries
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: ${{ matrix.vcpkg_force_system_binaries }}
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_default_triplet }}
        run: cmake --build --preset ninja-release-vcpkg --parallel

      - name: Package release asset
        id: package
        shell: bash
        run: |
          set -euo pipefail

          archive="Open3SDCM-${{ needs.prepare.outputs.version }}-${{ matrix.asset_suffix }}.${{ matrix.archive_extension }}"
          mkdir -p release
          cp "builds/ninja-release-vcpkg/bin/${{ matrix.executable_name }}" "release/${{ matrix.executable_name }}"

          pushd release >/dev/null
          if [ "${{ matrix.archive_format }}" = "zip" ]; then
            cmake -E tar cf "../${archive}" --format=zip -- "${{ matrix.executable_name }}"
          else
            cmake -E tar cfvz "../${archive}" --format=gnutar -- "${{ matrix.executable_name }}"
          fi
          popd >/dev/null

          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  publish:
    name: Publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-linux
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-macos
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-windows
          path: dist

      - name: Publish GitHub release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.prepare.outputs.tag }}"
          title="Open3SDCM ${tag}"

          ls -lah dist

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* \
              --title "${title}" \
              --generate-notes \
              --target "${GITHUB_SHA}"
          fi
