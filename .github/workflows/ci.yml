name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/BenchmarkResults/**'
      - '**/FunctionTests/**'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / GCC
            os: ubuntu-latest
            compiler: GCC
            cc: gcc
            cxx: g++
            linux_packages: ninja-build g++
          - name: Linux / Clang
            os: ubuntu-latest
            compiler: Clang
            cc: clang
            cxx: clang++
            linux_packages: ninja-build clang
          - name: macOS
            os: macos-latest
            compiler: AppleClang
          - name: Windows
            os: windows-latest
            compiler: MSVC

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.linux_packages }}

      - name: Setup ccache
        if: runner.os != 'Windows'
        uses: Chocobo1/setup-ccache-action@v1.4.3

      - name: Setup sccache
        if: runner.os == 'Windows'
        uses: mozilla-actions/sccache-action@v0.0.7

      - uses: lukka/get-cmake@latest

      - name: Restore or setup vcpkg
        uses: lukka/run-vcpkg@v11
        id: runvcpkg
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgJsonGlob: '**/vcpkg.json'
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: ${{ runner.os == 'Linux' && '1' || '' }}
          VCPKG_DEFAULT_TRIPLET: ${{ runner.os == 'Windows' && 'x64-windows' || '' }}
          SCCACHE_GHA_ENABLED: ${{ runner.os == 'Windows' && 'true' || '' }}

      - name: Configure and build
        uses: lukka/run-cmake@v10.7
        with:
          cmakeListsTxtPath: '${{ github.workspace }}/CMakeLists.txt'
          configurePreset: ninja-release-vcpkg-tests
          buildPreset: ninja-release-vcpkg-tests
        env:
          CC: ${{ matrix.cc || '' }}
          CXX: ${{ matrix.cxx || '' }}
          VCPKG_FORCE_SYSTEM_BINARIES: ${{ runner.os == 'Linux' && '1' || '' }}
          SCCACHE_GHA_ENABLED: ${{ runner.os == 'Windows' && 'true' || '' }}

      - name: Run tests
        run: ctest --preset ninja-release-vcpkg-tests --output-on-failure

  sanitizers:
    name: Sanitizers / Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-tidy cppcheck

      - name: Setup ccache
        uses: Chocobo1/setup-ccache-action@v1.4.3

      - uses: lukka/get-cmake@latest

      - name: Restore or setup vcpkg
        uses: lukka/run-vcpkg@v11
        id: runvcpkg
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgJsonGlob: '**/vcpkg.json'
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: 1

      - name: Configure and build with sanitizers
        uses: lukka/run-cmake@v10.7
        with:
          cmakeListsTxtPath: '${{ github.workspace }}/CMakeLists.txt'
          configurePreset: ninja-sanitizers-vcpkg
          buildPreset: ninja-sanitizers-vcpkg
        env:
          VCPKG_FORCE_SYSTEM_BINARIES: 1

      - name: Run tests
        run: ctest --preset ninja-sanitizers-vcpkg --output-on-failure
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:abort_on_error=1:print_stacktrace=1
